<head>

  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html { height: 100%; }

    body {
      min-height: 100dvh;
      background-color: #28293E;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    .page-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 52px 20px 36px;
      width: 100%;
    }

    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .logo-wrap {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(253, 240, 233, 0.15);
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .brand-name {
      color: #FDF0E9;
      font-size: 19px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-top: 4px;
    }

    .tagline {
      color: rgba(253, 240, 233, 0.72);
      font-size: 12px;
      text-align: center;
      letter-spacing: 0.01em;
      line-height: 1.5;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      border: none;
      border-radius: 14px;
      height: 58px;
      padding: 0 16px 0 12px;
      text-decoration: none;
      box-shadow: 0 1px 0 rgba(255,255,255,0.15) inset, 0 4px 24px rgba(0,0,0,0.35);
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.1s ease, transform 0.1s ease;
      cursor: pointer;
    }

    .link-btn:active {
      opacity: 0.85;
      transform: scale(0.985);
    }

    .icon-sq {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-sq svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }

    .link-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .link-label {
      color: #111122;
      font-size: 13.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .link-handle {
      color: #7a7a8e;
      font-size: 11px;
      line-height: 1.2;
    }

    .chevron {
      color: #aaaabc;
      font-size: 18px;
      flex-shrink: 0;
    }

    .icon-instagram {
      background: linear-gradient(45deg, #FFDC80 0%, #FCAF45 15%, #FD1D1D 50%, #E1306C 70%, #833AB4 100%);
    }
    .icon-facebook { background: #1877F2; }
    .icon-twitter  { background: #0a0a0a; }
    .icon-linkedin { background: #0A66C2; }
    .icon-website  { background: linear-gradient(135deg, #FF6A1E 0%, #E8541E 100%); }

    .footer {
      color: rgba(253, 240, 233, 0.15);
      font-size: 10px;
      text-align: center;
      margin-top: auto;
      padding-top: 28px;
      letter-spacing: 0.02em;
    }

    @media (min-width: 500px) {
      body {
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
      }

      .page-wrap {
        flex: none;
        max-width: 400px;
        background: #16172a;
        border: 1px solid rgba(253, 240, 233, 0.08);
        border-radius: 28px;
        padding: 40px 24px 28px;
        box-shadow: 0 24px 64px rgba(0,0,0,0.45);
      }

      .footer {
        margin-top: 24px;
        padding-top: 0;
      }

      .link-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 24px rgba(0,0,0,0.22);
      }
    }
  </style>
</head>
